[package]
name = "attend"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dirs = "6"
libc = "0.2"
lockfile = "0.3"
rusqlite = { version = "0.33", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
signal-hook = "0.3"
which = "7"

whisper-rs = "0.13"
parakeet-rs = "0.3"
cpal = "0.15"
rubato = "0.16"
similar = "2"
ureq = "3"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
insta = "1"
proptest = "1"
tempfile = "3"

[[bench]]
name = "e2e"
harness = false
