[package]
name = "attend"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Give your coding agent eyes and ears in your editor"
repository = "https://github.com/oxidecomputer/attend"
readme = "README.md"
keywords = ["cli", "editor", "agent", "narration", "pair-programming"]
categories = ["command-line-utilities", "development-tools"]

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
dirs = "6"
libc = "0.2"
lockfile = "0.3"
rusqlite = { version = "0.33", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
humantime = "2"
signal-hook = "0.3"
which = "7"

whisper-rs = "0.13"
parakeet-rs = "0.3"
cpal = "0.15"
rubato = "0.16"
similar = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
ureq = "3"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
insta = "1"
proptest = "1"
tempfile = "3"

[[bench]]
name = "e2e"
harness = false
