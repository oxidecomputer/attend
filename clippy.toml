# Project-level clippy configuration.
#
# These rules enforce the clock and settlement protocol conventions.
#
# Any operation that can block a thread indefinitely must be visible to
# the MockClock settlement protocol, either by going through
# SyncClock::sleep() or by bracketing the block with SyncClock::park().
# Operations that are invisible to settlement cause advance_and_settle()
# to hang waiting for a thread that will never re-enter sleep().
#
# Legitimate uses add #[allow(clippy::disallowed_methods)] with a
# comment explaining why the block is safe (e.g. not on a clock-managed
# thread, or correctly park-guarded).
#
# THEORETICAL NOTE: park-guarding ANY blocking call is always correct,
# including on the settlement driver thread and around brief mutex
# contention. The park guard's settled/expected accounting is balanced
# per guard lifecycle (settled +1 on creation, expected +1 on drop),
# stale values are wiped by advance_and_settle's reset at each cycle,
# and the guard is a no-op under RealClock. The only reason to omit a
# park guard is cost (two mutex ops per guard under test) or noise
# (annotations on every mutex lock), never correctness.
#
# NOT LINTED (too broad to flag as methods, enforce via design review):
# - Blocking socket/pipe reads (Read::read, BufRead::read_line): these
#   are trait methods that also cover file I/O. A blocking read on a
#   socket in a clock-managed thread is just as invisible to settlement
#   as a condvar wait. Use non-blocking I/O with try_read() in a
#   clock.sleep() poll loop, or bracket with park() and have the test
#   harness write to the socket to unblock.
# - Mutex::lock: brief contention, ubiquitous. Correct to park-guard
#   but the cost/noise ratio is poor.

disallowed-methods = [
    # --- Thread sleeping ---
    # All thread sleeping must go through SyncClock::sleep().
    { path = "std::thread::sleep", reason = "use SyncClock::sleep() for settlement-compatible sleeping" },

    # --- Thread parking ---
    # Easily confused with SyncClock::park() but completely unrelated.
    { path = "std::thread::park", reason = "use SyncClock::park() for settlement-compatible blocking; std::thread::park is invisible to the clock" },
    { path = "std::thread::park_timeout", reason = "use SyncClock::sleep() for settlement-compatible timed blocking" },

    # --- Condvar waits ---
    # Must be bracketed by a SyncClock::park() guard. The mock-clock
    # crate's internal condvar usage is exempt (it has its own
    # clippy.toml).
    { path = "std::sync::Condvar::wait", reason = "use SyncClock::park() guard around condvar waits in clock-managed threads" },
    { path = "std::sync::Condvar::wait_while", reason = "use SyncClock::park() guard around condvar waits in clock-managed threads" },
    { path = "std::sync::Condvar::wait_timeout", reason = "use SyncClock::park() guard around condvar waits in clock-managed threads" },
    { path = "std::sync::Condvar::wait_timeout_while", reason = "use SyncClock::park() guard around condvar waits in clock-managed threads" },

    # --- Channel receives ---
    # Blocking recv() waits indefinitely for a message. Use try_recv()
    # in a clock.sleep() poll loop, or bracket with park() if the
    # channel is driven by another clock-managed thread.
    { path = "std::sync::mpsc::Receiver::recv", reason = "use try_recv() in a SyncClock::sleep() loop, or bracket with SyncClock::park()" },
    { path = "std::sync::mpsc::Receiver::recv_timeout", reason = "use try_recv() in a SyncClock::sleep() loop" },

    # --- Socket / listener operations ---
    # These block indefinitely waiting for I/O. In clock-managed
    # threads, bracket with SyncClock::park(). The test_mode inject
    # reader is exempt (it is the settlement driver, not a participant).
    { path = "std::os::unix::net::UnixListener::accept", reason = "bracket with SyncClock::park() in clock-managed threads" },
    { path = "std::os::unix::net::UnixListener::incoming", reason = "bracket with SyncClock::park() in clock-managed threads" },
]
